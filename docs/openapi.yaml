      description: Сериализатор для сущности Question.
      properties:
        id:
          type: integer
          readOnly: true
        question_type:
          $ref: "#/components/schemas/QuestionTypeEnum"
        question_text:
          type: string
          maxLength: 512
        options:
          type: array
          items:
            $ref: "#/components/schemas/OptionAnswer"
          readOnly: true
      required:
        - id
        - options
        - question_text
    QuestionAttempt:
      type: object
      description: Сериализатор для просмотра вопросов на текущей попытку.
      properties:
        id:
          type: integer
          readOnly: true
        question_text:
          type: string
          maxLength: 512
      required:
        - id
        - question_text
    QuestionTypeEnum:
      enum:
        - SINGLE CHOICE
        - MULTIPLE CHOICE
        - TEXT ANSWER
        - FILE
        - INTEGER
      type: string
      description: |-
        * `SINGLE CHOICE` - Одиночный выбор
        * `MULTIPLE CHOICE` - Множественный выбор
        * `TEXT ANSWER` - Текстовый ответ
        * `FILE` - Загрузка файла
        * `INTEGER` - ЧИсловой формат
    RegistrationStatusEnum:
      enum:
        - DEFAULT
        - AWAIT
        - DONE
      type: string
      description: |-
        * `DEFAULT` - Статус по умолчанию
        * `AWAIT` - Ожидает регистрации
        * `DONE` - Зарегистрирован
    ResetUserPassword:
      type: object
      description: Сброс пароля пользователя через email.
      properties:
        verification_email:
          type: string
          format: email
          writeOnly: true
      required:
        - verification_email
    RoleEnum:
      enum:
        - DEFAULT
        - CANDIDATE
        - COMPANY USER
        - COMPANY ADMIN
        - SUPER ADMIN
      type: string
      description: |-
        * `DEFAULT` - Роль по умолчанию
        * `CANDIDATE` - Кандидат
        * `COMPANY USER` - Пользователь компании
        * `COMPANY ADMIN` - Администратор компании
        * `SUPER ADMIN` - Суперадминистратор
    SetUserPassword:
      type: object
      description: Получение полей пользователя и смена его пароля по ссылке.
      properties:
        email:
          type: string
          format: email
          readOnly: true
          title: Адрес электронной почты
        password:
          type: string
          writeOnly: true
          maxLength: 64
          minLength: 8
        repeat_password:
          type: string
          writeOnly: true
      required:
        - email
        - password
        - repeat_password
    Status01aEnum:
      enum:
        - NEW
        - VIEWED
        - ACCEPTED
        - REJECTED
      type: string
      description: |-
        * `NEW` - Новый
        * `VIEWED` - Просмотрено
        * `ACCEPTED` - Приглашение
        * `REJECTED` - Отклонен
