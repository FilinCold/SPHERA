openapi: 3.0.3
info:
  title: ""
  version: 0.0.0
paths:
  /api/v1/attempt/{attempt_id}/questions/:
    get:
      operationId: attempt_questions_list
      description: Класс представления для Получения всех вопросов у попытки.
      summary: id Вопросов у текущей попытки.
      parameters:
        - in: path
          name: attempt_id
          schema:
            type: integer
          required: true
        - name: limit
          required: false
          in: query
          description: Number of results to return per page.
          schema:
            type: integer
        - name: offset
          required: false
          in: query
          description: The initial index from which to return the results.
          schema:
            type: integer
      tags:
        - attempts
      security:
        - jwtAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedQuestionAttemptList"
          description: ""
  /api/v1/attempts/{attempt_id}/questions/{question_id}/answers/:
    get:
      operationId: attempts_questions_answers_list
      description: Класс представления для Ответов.
      summary: Ответы на вопрос
      parameters:
        - in: path
          name: attempt_id
          schema:
            type: string
            pattern: ^\d+$
          required: true
        - name: limit
          required: false
          in: query
          description: Number of results to return per page.
          schema:
            type: integer
        - name: offset
          required: false
          in: query
          description: The initial index from which to return the results.
          schema:
            type: integer
        - in: path
          name: question_id
          schema:
            type: string
            pattern: ^\d+$
          required: true
      tags:
        - answers
      security:
        - jwtAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAnswerList"
          description: ""
    post:
      operationId: attempts_questions_answers_create
      description: Класс представления для Ответов.
      summary: Создать ответ на вопрос
      parameters:
        - in: path
          name: attempt_id
          schema:
            type: string
            pattern: ^\d+$
          required: true
        - in: path
          name: question_id
          schema:
            type: string
            pattern: ^\d+$
          required: true
      tags:
        - answers
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Answer"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/Answer"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/Answer"
        required: true
      security:
        - jwtAuth: []
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Answer"
          description: ""
  /api/v1/attempts/{attempt_id}/questions/{question_id}/answers/{id}/:
    get:
      operationId: attempts_questions_answers_retrieve
      description: Класс представления для Ответов.
      summary: Конкретный ответ на вопрос
      parameters:
        - in: path
          name: attempt_id
          schema:
            type: string
            pattern: ^\d+$
          required: true
        - in: path
          name: id
          schema:
            type: string
          required: true
        - in: path
          name: question_id
          schema:
            type: string
            pattern: ^\d+$
          required: true
      tags:
        - answers
      security:
        - jwtAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Answer"
          description: ""
  /api/v1/auth/{registration_uuid}/:
    get:
      operationId: auth_retrieve
      description: Получение пользователя и смена его пароля по ссылке.
      summary: Получение email перед установкой нового пароля по ссылке.
      parameters:
        - in: path
          name: registration_uuid
          schema:
            type: string
            format: uuid
          required: true
      tags:
        - users
      security:
        - jwtAuth: []
        - {}
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetUserPassword"
          description: ""
    put:
      operationId: auth_update
      description: Получение пользователя и смена его пароля по ссылке.
      summary: Метод PUT запрещен.
      parameters:
        - in: path
          name: registration_uuid
          schema:
            type: string
            format: uuid
          required: true
      tags:
        - users
      security:
        - jwtAuth: []
        - {}
      responses:
        "405":
          description: Method Not Allowed
    patch:
      operationId: auth_partial_update
      description: Получение пользователя и смена его пароля по ссылке.
      summary: Установка нового пароля по ссылке.
      parameters:
        - in: path
          name: registration_uuid
          schema:
            type: string
            format: uuid
          required: true
      tags:
        - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetUserPassword"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/SetUserPassword"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/SetUserPassword"
        required: true
      security:
        - jwtAuth: []
        - {}
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
          description: ""
  /api/v1/auth/change-password/:
    put:
      operationId: auth_change_password_update
      description: Обновление пароля пользователя.
      summary: Метод PUT запрещен.
      tags:
        - users
      security:
        - jwtAuth: []
      responses:
        "405":
          description: Method Not Allowed
    patch:
      operationId: auth_change_password_partial_update
      description: Обновление пароля пользователя.
      summary: Обновление своего пароля пользователем.
      tags:
        - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeUserPassword"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/ChangeUserPassword"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ChangeUserPassword"
        required: true
      security:
        - jwtAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
          description: ""
  /api/v1/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Получение информации о себе и ее редактирование.
      summary: Получение информации о себе.
      tags:
        - users
      security:
        - jwtAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRetrieveUpdate"
          description: ""
    put:
      operationId: auth_me_update
      description: Получение информации о себе и ее редактирование.
      summary: Метод PUT запрещен.
      tags:
        - users
      security:
        - jwtAuth: []
      responses:
        "405":
          description: Method Not Allowed
    patch:
      operationId: auth_me_partial_update
      description: Получение информации о себе и ее редактирование.
      summary: Редактирование информации о себе.
      tags:
        - users
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                email:
                  type: string
                name:
                  type: string
                phone:
                  type: string
                resume:
                  type: file
      security:
        - jwtAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRetrieveUpdate"
          description: ""
  /api/v1/auth/reset-password/:
    put:
      operationId: auth_reset_password_update
      description: Сброс пароля пользователя через email.
      summary: Метод PUT запрещен.
      tags:
        - users
      security:
        - jwtAuth: []
        - {}
      responses:
        "405":
          description: Method Not Allowed
    patch:
      operationId: auth_reset_password_partial_update
      description: Сброс пароля пользователя через email.
      summary: Сброс своего пароля через email.
      tags:
        - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetUserPassword"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/ResetUserPassword"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ResetUserPassword"
        required: true
      security:
        - jwtAuth: []
        - {}
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
          description: ""
  /api/v1/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
        - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenObtainPair"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TokenObtainPair"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/TokenObtainPair"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenObtainPair"
          description: ""
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
        - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRefresh"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TokenRefresh"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/TokenRefresh"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenRefresh"
          description: ""
  /api/v1/auth/token/verify/:
    post:
      operationId: auth_token_verify_create
      description: |-
        Takes a token and indicates if it is valid.  This view provides no
        information about a token's fitness for a particular use.
      tags:
        - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenVerify"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TokenVerify"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/TokenVerify"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenVerify"
          description: ""
  /api/v1/candidate-registration/:
    post:
      operationId: candidate_registration_create
      description: Регистрация кандидата.
      tags:
        - candidates
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CandidateReg"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/CandidateReg"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CandidateReg"
        required: true
      security:
        - jwtAuth: []
        - {}
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateReg"
          description: ""
  /api/v1/companies/:
    get:
      operationId: companies_list
      description: Класс представления для компаний.
      summary: Список компаний кратко.
      parameters:
        - name: limit
          required: false
          in: query
          description: Number of results to return per page.
          schema:
            type: integer
        - name: offset
          required: false
          in: query
          description: The initial index from which to return the results.
          schema:
            type: integer
        - name: ordering
          required: false
          in: query
          description: Which field to use when ordering the results.
          schema:
            type: string
        - name: search
          required: false
          in: query
          description: A search term.
          schema:
            type: string
      tags:
        - companies
      security:
        - jwtAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCompanyBriefList"
          description: ""
    post:
      operationId: companies_create
      description: Класс представления для компаний.
      summary: Создать компанию.
      tags:
        - companies
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Company"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/Company"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/Company"
        required: true
      security:
        - jwtAuth: []
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
          description: ""
  /api/v1/companies/{company_slug}/courses/:
    get:
      operationId: companies_courses_list
      description: Класс представления для курсов.
      summary: Список курсов компании
      parameters:
        - in: path
          name: company_slug
          schema:
            type: string
            pattern: ^[-\w]+$
          required: true
        - name: limit
          required: false
          in: query
          description: Number of results to return per page.
          schema:
            type: integer
        - name: offset
          required: false
          in: query
          description: The initial index from which to return the results.
          schema:
            type: integer
      tags:
        - courses
      security:
        - jwtAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCourseList"
          description: ""
    post:
      operationId: companies_courses_create
      description: Класс представления для курсов.
      summary: Создать новый курс
      parameters:
        - in: path
          name: company_slug
          schema:
            type: string
            pattern: ^[-\w]+$
          required: true
      tags:
        - courses
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Course"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/Course"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/Course"
        required: true
      security:
        - jwtAuth: []
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
          description: ""
  /api/v1/companies/{company_slug}/courses/{course_uuid}/:
    get:
      operationId: companies_courses_retrieve
      description: Класс представления для курсов.
      summary: Получить курс по course_uuid
      parameters:
        - in: path
          name: company_slug
          schema:
            type: string
            pattern: ^[-\w]+$
          required: true
        - in: path
          name: course_uuid
          schema:
            type: string
          required: true
      tags:
        - courses
      security:
        - jwtAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
          description: ""
    patch:
      operationId: companies_courses_partial_update
      description: Класс представления для курсов.
      summary: Частичное обновление курса
      parameters:
        - in: path
          name: company_slug
          schema:
            type: string
            pattern: ^[-\w]+$
          required: true
        - in: path
          name: course_uuid
          schema:
            type: string
          required: true
      tags:
        - courses
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Course"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/Course"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/Course"
        required: true
      security:
        - jwtAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
          description: ""
    delete:
      operationId: companies_courses_destroy
      description: Класс представления для курсов.
      summary: Мягкое удаление курса (в корзину)
      parameters:
        - in: path
          name: company_slug
          schema:
            type: string
            pattern: ^[-\w]+$
          required: true
        - in: path
          name: course_uuid
          schema:
            type: string
          required: true
      tags:
        - courses
      security:
        - jwtAuth: []
      responses:
        "204":
          description: No response body
  /api/v1/companies/{company_slug}/courses/{course_uuid}/info/:
    get:
      operationId: companies_courses_info_retrieve
      description: Возвращает дату удаления объекта
      summary: Информация об объекте в корзине
      parameters:
        - in: path
          name: company_slug
          schema:
            type: string
            pattern: ^[-\w]+$
          required: true
        - in: path
          name: course_uuid
          schema:
            type: string
          required: true
      tags:
        - courses
      security:
        - jwtAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedAt"
          description: ""
  /api/v1/companies/{company_slug}/courses/{course_uuid}/permanent/:
    delete:
      operationId: companies_courses_permanent_destroy
      description: Безвозвратное удаление объекта из базы данных
      summary: Полное удаление объекта из БД
      parameters:
        - in: path
          name: company_slug
          schema:
            type: string
            pattern: ^[-\w]+$
          required: true
        - in: path
          name: course_uuid
          schema:
            type: string
          required: true
      tags:
        - courses
      security:
        - jwtAuth: []
      responses:
        "204":
          description: Объект удалён
  /api/v1/companies/{company_slug}/courses/{course_uuid}/publish/:
    patch:
      operationId: companies_courses_publish_partial_update
      description: Переводит курс из статуса DRAFT в PUBLISHED
      summary: Опубликовать курс из черновика
      parameters:
        - in: path
          name: company_slug
          schema:
            type: string
            pattern: ^[-\w]+$
          required: true
        - in: path
          name: course_uuid
          schema:
            type: string
          required: true
      tags:
        - courses
      security:
        - jwtAuth: []
      responses:
        "200":
          description: Курс опубликован
  /api/v1/companies/{company_slug}/courses/{course_uuid}/restore/:
    patch:
      operationId: companies_courses_restore_partial_update
      description: Меняет статус с DELETED на DRAFT, очищает deleted_at
      summary: Восстановление объекта из корзины
      parameters:
        - in: path
          name: company_slug
          schema:
            type: string
            pattern: ^[-\w]+$
          required: true
        - in: path
          name: course_uuid
          schema:
            type: string
          required: true
      tags:
        - courses
      security:
        - jwtAuth: []
      responses:
        "200":
          description: Обьект восстановлен
  /api/v1/companies/{company_slug}/courses/trash/:
    get:
      operationId: companies_courses_trash_list
      description: Возвращает список курсов в корзине (статус DELETED)
      summary: Список удалённых курсов
      parameters:
        - in: path
          name: company_slug
          schema:
            type: string
            pattern: ^[-\w]+$
          required: true
        - name: limit
          required: false
          in: query
          description: Number of results to return per page.
          schema:
            type: integer
        - name: offset
          required: false
          in: query
          description: The initial index from which to return the results.
          schema:
            type: integer
      tags:
        - courses
      security:
        - jwtAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCourseList"
          description: ""
  /api/v1/companies/{company_slug}/employees/:
    get:
      operationId: companies_employees_list
      description: "Управление сотрудниками: создание, получение, обновление, удаление)."
      summary: Список сотрудников.
      parameters:
        - in: path
          name: company_slug
          schema:
            type: string
            pattern: ^[-\w]+$
          required: true
        - name: limit
          required: false
          in: query
          description: Number of results to return per page.
          schema:
            type: integer
        - name: offset
          required: false
          in: query
          description: The initial index from which to return the results.
          schema:
            type: integer
        - name: ordering
          required: false
          in: query
          description: Which field to use when ordering the results.
          schema:
            type: string
        - name: search
          required: false
          in: query
          description: A search term.
          schema:
            type: string
      tags:
        - employees
      security:
        - jwtAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedEmployeesList"
          description: ""
    post:
      operationId: companies_employees_create
      description: "Управление сотрудниками: создание, получение, обновление, удаление)."
      summary: Создать сотрудника.
      parameters:
        - in: path
          name: company_slug
          schema:
            type: string
            pattern: ^[-\w]+$
          required: true
      tags:
        - employees
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Employees"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/Employees"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/Employees"
        required: true
      security:
        - jwtAuth: []
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employees"
          description: ""
  /api/v1/companies/{company_slug}/employees/{id}/:
    get:
      operationId: companies_employees_retrieve
      description: "Управление сотрудниками: создание, получение, обновление, удаление)."
      summary: Детали сотрудника.
      parameters:
        - in: path
          name: company_slug
          schema:
            type: string
            pattern: ^[-\w]+$
          required: true
        - in: path
          name: id
          schema:
            type: string
          required: true
      tags:
        - employees
      security:
        - jwtAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employees"
          description: ""
    put:
