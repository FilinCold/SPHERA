components:
  schemas:
    Answer:
      type: object
      description: Миксин для проверки правильности ответов.
      properties:
        id:
          type: integer
          readOnly: true
        text: {}
        is_correct:
          type: string
          readOnly: true
      required:
        - id
        - is_correct
        - text
    Candidate:
      type: object
      description: Получение информации о кандидате.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          nullable: true
          title: ФИО пользователя
          maxLength: 128
        email:
          type: string
          format: email
          title: Адрес электронной почты
          maxLength: 128
      required:
        - email
        - id
    CandidateAnswers:
      type: object
      properties:
        course:
          type: string
          readOnly: true
        candidate:
          type: string
          readOnly: true
        lessons:
          type: string
          readOnly: true
      required:
        - candidate
        - course
        - lessons
    CandidateReg:
      type: object
      description: '"Регистрация кандидата.'
      properties:
        email:
          type: string
          format: email
          title: Адрес электронной почты
          maxLength: 128
        password:
          type: string
          writeOnly: true
          maxLength: 64
          minLength: 8
        name:
          type: string
          nullable: true
          title: ФИО пользователя
          maxLength: 128
        phone:
          type: string
          nullable: true
          title: Номер телефона
          maxLength: 32
        consent_to_data_processing:
          type: boolean
          writeOnly: true
      required:
        - consent_to_data_processing
        - email
        - password
    ChangeUserPassword:
      type: object
      description: Обновление пароля пользователя с проверкой текущего.
      properties:
        current_password:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
          maxLength: 64
          minLength: 8
      required:
        - current_password
        - password
    Company:
      type: object
      description: Класс сериализатора для компаний.
      properties:
        name:
          type: string
          title: Название компании
          maxLength: 128
        description:
          type: string
          nullable: true
          title: Описание компании
          maxLength: 1000
        slug:
          type: string
          nullable: true
          pattern: ^[-a-zA-Z0-9_]+$
      required:
        - name
    CompanyBrief:
      type: object
      description: Класс сериализатора для возврата краткой информации о компаний.
      properties:
        name:
          type: string
          title: Название компании
          maxLength: 128
        slug:
          type: string
          title: Уникальный слаг компании
          maxLength: 192
          pattern: ^[-a-zA-Z0-9_]+$
        space_company:
          type: string
          readOnly: true
      required:
        - name
        - slug
        - space_company
    CompanyDetail:
      type: object
      description: Класс сериализатора для возврата подробной информации о компании.
      properties:
        name:
          type: string
          title: Название компании
          maxLength: 128
        description:
          type: string
          nullable: true
          title: Описание компании
          maxLength: 1000
        slug:
          type: string
          title: Уникальный слаг компании
          maxLength: 192
          pattern: ^[-a-zA-Z0-9_]+$
        space_company:
          type: string
          readOnly: true
        actual_subscriptions:
          type: array
          items:
            type: object
          readOnly: true
      required:
        - actual_subscriptions
        - name
        - slug
        - space_company
    Course:
      type: object
      description: Сериализатор для курсов.
      properties:
        course_uuid:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        title:
          type: string
          title: Название курса
          maxLength: 128
        description:
          type: string
          maxLength: 1000
        deleted_at:
          type: string
          readOnly: true
        status:
          allOf:
            - $ref: "#/components/schemas/CourseStatusEnum"
          readOnly: true
        creator:
          type: integer
          readOnly: true
          nullable: true
          title: Создатель курса
        has_active_applications:
          type: string
          readOnly: true
        save_as_draft:
          type: boolean
          writeOnly: true
      required:
        - course_uuid
        - creator
        - deleted_at
        - description
        - has_active_applications
        - status
        - title
    CourseCandidateDetail:
      type: object
      description: Получение отклика, установка статуса и добавление комментария.
      properties:
        id:
          type: integer
          readOnly: true
        progress:
          type: string
          readOnly: true
        status:
          $ref: "#/components/schemas/Status01aEnum"
        start_date:
          type: string
          readOnly: true
        end_date:
          type: string
          readOnly: true
        candidate:
          allOf:
            - $ref: "#/components/schemas/Candidate"
          readOnly: true
        comment:
          type: string
          nullable: true
          title: Комментарий
      required:
        - candidate
        - end_date
        - id
        - progress
        - start_date
    CourseCandidatesList:
      type: object
      description: Получение откликов (кандидатов) курса.
      properties:
        id:
          type: integer
          readOnly: true
        progress:
          type: string
          readOnly: true
        status:
          $ref: "#/components/schemas/Status01aEnum"
        start_date:
          type: string
          readOnly: true
        end_date:
          type: string
          readOnly: true
        candidate_email:
          type: string
          readOnly: true
      required:
        - candidate_email
        - end_date
        - id
        - progress
        - start_date
    CourseStatusEnum:
      enum:
        - DRAFT
        - PUBLISHED
        - ARCHIVED
        - DELETED
      type: string
      description: |-
        * `DRAFT` - Черновик
        * `PUBLISHED` - Опубликован
        * `ARCHIVED` - Архивирован
        * `DELETED` - Удален
    DeletedAt:
      type: object
      properties:
        deleted_at:
          type: string
          format: date-time
      required:
        - deleted_at
    EmployeeFinalReg:
      type: object
      description: Получение полей нового сотрудника и его финальная регистрация.
      properties:
        email:
          type: string
          format: email
          readOnly: true
          title: Адрес электронной почты
        password:
          type: string
          writeOnly: true
          maxLength: 64
          minLength: 8
        name:
          type: string
          nullable: true
          title: ФИО пользователя
          maxLength: 128
        phone:
          type: string
          nullable: true
          title: Номер телефона
          maxLength: 32
        company:
          allOf:
            - $ref: "#/components/schemas/Company"
          readOnly: true
        role:
          allOf:
            - $ref: "#/components/schemas/RoleEnum"
          readOnly: true
          title: Роль пользователя
      required:
        - company
        - email
        - password
        - role
    Employees:
      type: object
      description: Создание, получение и обновление сотрудников компании.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          nullable: true
          title: ФИО пользователя
          maxLength: 128
        email:
          type: string
          format: email
          title: Адрес электронной почты
          maxLength: 128
        phone:
          type: string
          nullable: true
          title: Номер телефона
          maxLength: 32
        role:
          $ref: "#/components/schemas/RoleEnum"
        registration_link:
          type: string
          readOnly: true
        registration_status:
          allOf:
            - $ref: "#/components/schemas/RegistrationStatusEnum"
          readOnly: true
          title: Статус регистрации
      required:
        - email
        - id
        - registration_link
        - registration_status
        - role
    Lesson:
      type: object
      description: Сериализатор для уроков.
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          title: Название урока
          maxLength: 128
        content:
          type: string
          title: Лекция
        ordinal_number:
          type: integer
          readOnly: true
        has_active_progressions:
          type: string
          readOnly: true
        status:
          allOf:
            - $ref: "#/components/schemas/LessonStatusEnum"
          readOnly: true
        deleted_at:
          type: string
          readOnly: true
        save_as_draft:
          type: boolean
          writeOnly: true
      required:
        - content
        - deleted_at
        - has_active_progressions
        - id
        - ordinal_number
        - status
