          readOnly: true
          nullable: true
        score:
          type: integer
          readOnly: true
        max_score:
          type: integer
          readOnly: true
        started_at:
          type: string
          format: date-time
          readOnly: true
        completed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
        - completed_at
        - id
        - max_score
        - passed
        - score
        - started_at
