      type: object
      description: Класс сериализатора для подписок компаний.
      properties:
        id:
          type: integer
          readOnly: true
        status:
          type: string
          readOnly: true
        start_date:
          type: string
          format: date
          title: Дата начала подписки
        end_date:
          type: string
          format: date
          title: Дата окончания подписки
      required:
        - end_date
        - id
        - start_date
        - status
